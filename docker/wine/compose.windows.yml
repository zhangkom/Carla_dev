services:
  carla-wine:
    build:
      context: ../..
      dockerfile: docker/wine/Dockerfile
    image: carla-music-service:wine-prototype
    environment:
      MUSIC_SERVICE_CONFIG: /app/config/plugins.wine.example.json
      WINEPREFIX: /wineprefix
      WINEARCH: win64
      WINEDEBUG: -all
      DISPLAY: :99
    ports:
      - "8000:8000"
    volumes:
      - ../..:/app
      - C:/VSTPlugins/KongAudio:/wineprefix/drive_c/VSTPlugins/KongAudio:ro
      - C:/work/workspace_ffmpeg/ffmpeg-8.0-essentials_build/ffmpeg-8.0-essentials_build/bin:/wineprefix/drive_c/ffmpeg/bin:ro
      - E:/Kong Audio Library:/kong-library:ro
      - wineprefix:/wineprefix

volumes:
  wineprefix:
